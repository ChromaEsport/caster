<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Chroma Control</title>
<link rel="stylesheet" href="control.css">
</head>

<body>
<div class="container">
<h1>CHROMA CONTROL PANEL</h1>

<div class="team-card chroma-card">

    <h2 class="section-title">
ÉQUIPE 1
</h2>

    <input id="team1" value="CHROMA">


    <div class="score-control">

        <button onclick="removeScore1()">−</button>

        <span id="score1">0</span>

        <button onclick="addScore1()">+</button>

    </div>

</div>


<hr>


<div class="team-card">

    <h2 class="section-title">
ÉQUIPE 2
</h2>

    <input id="team2" value="TEAM BETA">


    <div class="score-control">

        <button onclick="removeScore2()">−</button>

        <span id="score2">0</span>

        <button onclick="addScore2()">+</button>

    </div>

</div>


<hr>


<h2>CHOISIR MAP</h2>

<select id="map">


<optgroup label="CONTROL">

<option>BUSAN</option>
<option>ILIOS</option>
<option>LIJIANG TOWER</option>
<option>NEPAL</option>
<option>OASIS</option>
<option>SAMOA</option>

</optgroup>



<optgroup label="HYBRID">

<option>KING'S ROW</option>
<option>HOLLYWOOD</option>
<option>MIDTOWN</option>
<option>NUMBANI</option>
<option>PARAISO</option>
<option>EICHENWALDE</option>
<option>BLIZZARD WORLD</option>

</optgroup>



<optgroup label="ESCORT">

<option>CIRCUIT ROYAL</option>
<option>DORADO</option>
<option>HAVANA</option>
<option>JUNKERTOWN</option>
<option>RIALTO</option>
<option>ROUTE 66</option>
<option>SHAMBALI MONASTERY</option>
<option>WATCHPOINT GIBRALTAR</option>

</optgroup>



<optgroup label="PUSH">

<option>COLOSSEO</option>
<option>ESPERANÇA</option>
<option>NEW QUEEN STREET</option>
<option>RUNASAPI</option>

</optgroup>



<optgroup label="FLASHPOINT">

<option>NEW JUNK CITY</option>
<option>SURAVASA</option>
<option>HANAOKA</option>
<option>THRONE OF ANUBIS</option>

</optgroup>


</select>

<br><br>

<button class="send-button" onclick="sendMatch()">
ENVOYER
</button>


<script type="module" src="control.js"></script>
</div>
</body>

</html>
