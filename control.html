<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Chroma Control</title>
<link rel="stylesheet" href="control.css">
</head>

<body>
<div class="container">
<h1>CHROMA CONTROL PANEL</h1>

<div class="team-card chroma-card">

    <h2 class="section-title">
ÉQUIPE 1
</h2>

    <input id="team1" value="CHROMA">


    <div class="score-control">

        <button onclick="removeScore1()">−</button>

        <span id="score1">0</span>

        <button onclick="addScore1()">+</button>

    </div>

</div>


<hr>


<div class="team-card">

    <h2 class="section-title">
ÉQUIPE 2
</h2>

    <input id="team2" value="TEAM BETA">


    <div class="score-control">

        <button onclick="removeScore2()">−</button>

        <span id="score2">0</span>

        <button onclick="addScore2()">+</button>

    </div>

</div>


<hr>


<h2>CHOISIR MAP</h2>

<select id="map">

    <option value="KING'S ROW">KING'S ROW</option>

    <option value="LIJIANG TOWER">LIJIANG TOWER</option>

    <option value="NEPAL">NEPAL</option>

    <option value="ILIOS">ILIOS</option>

    <option value="BUSAN">BUSAN</option>

    <option value="HOLLYWOOD">HOLLYWOOD</option>

    <option value="NUMBANI">NUMBANI</option>

    <option value="KING'S ROW">KING'S ROW</option>

    <option value="CIRCUIT ROYAL">CIRCUIT ROYAL</option>

    <option value="DORADO">DORADO</option>

    <option value="ROUTE 66">ROUTE 66</option>

    <option value="JUNKERTOWN">JUNKERTOWN</option>

    <option value="MIDTOWN">MIDTOWN</option>

    <option value="PARAISO">PARAISO</option>

</select>

<br><br>

<button class="send-button" onclick="sendMatch()">
ENVOYER
</button>


<script type="module" src="control.js"></script>
</div>
</body>

</html>
